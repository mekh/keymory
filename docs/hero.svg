<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#161d33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#8f7bff"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="358" rx="20" fill="url(#bg)" stroke="#2a3350" stroke-width="1.5"/>

  <!-- Left: wordmark -->
  <g transform="translate(64,96)">
    <text x="0" y="0" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">Keymory</text>
    <text x="2" y="52" font-size="26" font-weight="600" fill="url(#accent)">Your keyboard remembers every app.</text>
    <text x="2" y="96" font-size="18" fill="#9aa6c4">A tiny macOS menu-bar app that sets the right input</text>
    <text x="2" y="122" font-size="18" fill="#9aa6c4">language automatically — the instant you switch apps.</text>

    <!-- badges -->
    <g transform="translate(2,156)" font-size="14" font-weight="600">
      <rect x="0" y="0" width="86" height="30" rx="8" fill="#1d2540" stroke="#33406b"/>
      <text x="43" y="20" fill="#cdd6f4" text-anchor="middle">macOS</text>
      <rect x="98" y="0" width="86" height="30" rx="8" fill="#1d2540" stroke="#33406b"/>
      <text x="141" y="20" fill="#cdd6f4" text-anchor="middle">Swift</text>
      <rect x="196" y="0" width="140" height="30" rx="8" fill="#1d2540" stroke="#33406b"/>
      <text x="266" y="20" fill="#cdd6f4" text-anchor="middle">No Accessibility</text>
      <rect x="348" y="0" width="118" height="30" rx="8" fill="#1d2540" stroke="#33406b"/>
      <text x="407" y="20" fill="#cdd6f4" text-anchor="middle">100% local</text>
    </g>
  </g>

  <!-- Right: menu bar mock -->
  <g transform="translate(720,120)">
    <rect x="0" y="0" width="416" height="120" rx="16" fill="#0f1424" stroke="#2a3350"/>
    <!-- menu bar strip -->
    <rect x="20" y="24" width="376" height="34" rx="10" fill="#05070f"/>
    <text x="40" y="46" font-size="14" fill="#8b97b6">48°</text>
    <!-- wifi -->
    <path d="M120 46 a10 10 0 0 1 20 0" fill="none" stroke="#8b97b6" stroke-width="2"/>
    <circle cx="130" cy="47" r="1.8" fill="#8b97b6"/>
    <!-- battery -->
    <rect x="168" y="38" width="26" height="14" rx="3" fill="none" stroke="#8b97b6" stroke-width="1.6"/>
    <rect x="170" y="40" width="16" height="10" rx="1.5" fill="#7cd992"/>
    <!-- highlighted Keymory pill -->
    <rect x="228" y="28" width="60" height="26" rx="8" fill="#26304f" stroke="url(#accent)" stroke-width="1.5"/>
    <text x="258" y="46" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">UA</text>
    <!-- clock -->
    <text x="360" y="46" font-size="14" fill="#8b97b6" text-anchor="middle">16:41</text>

    <text x="208" y="92" font-size="13" fill="#9aa6c4" text-anchor="middle">Live language indicator — flag or code, right in your menu bar</text>
    <!-- pointer to pill -->
    <path d="M258 58 l0 14" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="258" cy="74" r="2.5" fill="#8f7bff"/>
  </g>
</svg>
