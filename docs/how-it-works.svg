<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#161d33"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1198" height="418" rx="20" fill="url(#bg2)" stroke="#2a3350" stroke-width="1.5"/>

  <text x="600" y="60" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">One rule: every app keeps the language you last used in it.</text>

  <!-- Window template macro drawn 3x -->
  <!-- Card 1: Browser EN -->
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="#0f1424" stroke="#2a3350"/>
    <circle cx="24" cy="26" r="6" fill="#ff5f57"/><circle cx="46" cy="26" r="6" fill="#febc2e"/><circle cx="68" cy="26" r="6" fill="#28c840"/>
    <text x="160" y="31" font-size="15" font-weight="600" fill="#9aa6c4" text-anchor="middle">Browser</text>
    <line x1="0" y1="46" x2="320" y2="46" stroke="#2a3350"/>
    <rect x="110" y="88" width="100" height="64" rx="14" fill="#20305a" stroke="#5b8cff" stroke-width="1.5"/>
    <text x="160" y="132" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">EN</text>
    <text x="160" y="184" font-size="14" fill="#8b97b6" text-anchor="middle">typing in English</text>
  </g>

  <!-- Card 2: Editor UA -->
  <g transform="translate(440,120)">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="#0f1424" stroke="#2a3350"/>
    <circle cx="24" cy="26" r="6" fill="#ff5f57"/><circle cx="46" cy="26" r="6" fill="#febc2e"/><circle cx="68" cy="26" r="6" fill="#28c840"/>
    <text x="160" y="31" font-size="15" font-weight="600" fill="#9aa6c4" text-anchor="middle">Editor</text>
    <line x1="0" y1="46" x2="320" y2="46" stroke="#2a3350"/>
    <rect x="110" y="88" width="100" height="64" rx="14" fill="#2a1f3f" stroke="#8f7bff" stroke-width="1.5"/>
    <text x="160" y="132" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">UA</text>
    <text x="160" y="184" font-size="14" fill="#8b97b6" text-anchor="middle">typing in Ukrainian</text>
  </g>

  <!-- Card 3: Chat EN -->
  <g transform="translate(800,120)">
    <rect x="0" y="0" width="320" height="220" rx="14" fill="#0f1424" stroke="#2a3350"/>
    <circle cx="24" cy="26" r="6" fill="#ff5f57"/><circle cx="46" cy="26" r="6" fill="#febc2e"/><circle cx="68" cy="26" r="6" fill="#28c840"/>
    <text x="160" y="31" font-size="15" font-weight="600" fill="#9aa6c4" text-anchor="middle">Chat</text>
    <line x1="0" y1="46" x2="320" y2="46" stroke="#2a3350"/>
    <rect x="110" y="88" width="100" height="64" rx="14" fill="#20305a" stroke="#5b8cff" stroke-width="1.5"/>
    <text x="160" y="132" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle">EN</text>
    <text x="160" y="184" font-size="14" fill="#8b97b6" text-anchor="middle">typing in English</text>
  </g>

  <!-- arrows between cards -->
  <g stroke="#5b8cff" stroke-width="2" fill="none">
    <path d="M406 230 l28 0" marker-end="url(#arr)"/>
    <path d="M766 230 l28 0" marker-end="url(#arr)"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#5b8cff"/>
    </marker>
  </defs>

  <text x="600" y="384" font-size="15" fill="#9aa6c4" text-anchor="middle">Cmd-Tab between them and the input language follows — no manual switching, ever.</text>
</svg>
